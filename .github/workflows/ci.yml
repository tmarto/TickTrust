name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

env:
  KOTLIN_VERSION: '2.0.21'
  JAVA_VERSION: '17'

jobs:
  # ── Job 1: Static analysis + unit tests ───────────────────────────────────
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run ktlint
        run: ./gradlew ktlintCheck

      - name: Run unit tests with coverage
        run: ./gradlew :shared:koverXmlReport

      - name: Check coverage threshold (60%)
        run: |
          python3 - << 'EOF'
          import xml.etree.ElementTree as ET, sys, os
          path = "shared/build/reports/kover/report.xml"
          if not os.path.exists(path):
              print(f"ERROR: Coverage report not found at {path}")
              sys.exit(1)
          tree = ET.parse(path)
          root = tree.getroot()
          counter = next(
              (c for c in root.findall("counter") if c.get("type") == "LINE"),
              None
          )
          if counter is None:
              print("ERROR: LINE counter not found in coverage report")
              sys.exit(1)
          covered = int(counter.get("covered", 0))
          missed = int(counter.get("missed", 0))
          total = covered + missed
          if total == 0:
              print("ERROR: No lines found in coverage report")
              sys.exit(1)
          pct = covered / total * 100
          print(f"Coverage: {pct:.1f}% ({covered}/{total} lines)")
          if pct < 60:
              print(f"FAIL: {pct:.1f}% is below 60% threshold")
              sys.exit(1)
          print("Coverage threshold passed.")
          EOF

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: shared/build/reports/kover/
          retention-days: 14

  # ── Job 2: Integration tests (Android emulator) ───────────────────────────
  integration-test:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run integration tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_2
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: ./gradlew :androidApp:connectedDebugAndroidTest

  # ── Job 3: Build Android APK ───────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    needs: [ lint-and-test, integration-test ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          BUILD="${{ github.run_number }}"
          sed -i "s/versionName = \".*\"/versionName = \"${VERSION}\"/" androidApp/build.gradle.kts
          sed -i "s/versionCode = .*/versionCode = ${BUILD}/" androidApp/build.gradle.kts
          echo "Version set to ${VERSION}+${BUILD}"

      - name: Build APK (obfuscated release)
        run: ./gradlew :androidApp:assembleRelease

      - name: Rename APK
        run: |
          VERSION=$(echo "${GITHUB_REF_NAME:-$GITHUB_SHA}" | tr '/' '-')
          # An unsigned, minified release build produces androidApp-release-unsigned.apk
          APK=$(find androidApp/build/outputs/apk/release -name '*.apk' | head -1)
          echo "Found APK: $APK"
          cp "$APK" "androidApp/build/outputs/apk/release/zeitbank-${VERSION}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeitbank-android-${{ github.sha }}
          path: androidApp/build/outputs/apk/release/zeitbank-*.apk
          retention-days: 30

  # ── Job 4: Build iOS IPA ───────────────────────────────────────────────────
  build-ios:
    runs-on: macos-latest
    needs: [ lint-and-test, integration-test ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build shared KMP framework for iOS
        run: ./gradlew :shared:assembleZeitBankSharedReleaseXCFramework

      - name: Archive iOS app (unsigned)
        run: |
          xcodebuild archive \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/ios/iosApp.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Export IPA (no signing)
        run: |
          cat > /tmp/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath build/ios/iosApp.xcarchive \
            -exportPath build/ios/export \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO || true
          # Fallback: package directly from .app in archive
          if [ ! -f "build/ios/export/iosApp.ipa" ]; then
            mkdir -p build/ios/export/Payload
            cp -r build/ios/iosApp.xcarchive/Products/Applications/iosApp.app \
                  build/ios/export/Payload/
            cd build/ios/export
            zip -r iosApp.ipa Payload
            rm -rf Payload
          fi

      - name: Rename IPA
        run: |
          VERSION=$(echo "${GITHUB_REF_NAME:-$GITHUB_SHA}" | tr '/' '-')
          cp build/ios/export/iosApp.ipa build/ios/export/zeitbank-${VERSION}.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeitbank-ios-${{ github.sha }}
          path: build/ios/export/zeitbank-*.ipa
          retention-days: 30

  # ── Job 5: Upload to TestFlight (tags only) ───────────────────────────────
  testflight:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    needs: [ build-ios ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import distribution certificate
        env:
          DIST_CERT_P12_BASE64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          DIST_CERT_PASSWORD: ${{ secrets.IOS_DIST_CERT_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/dist_cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD=$(uuidgen)
          echo -n "$DIST_CERT_P12_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$DIST_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"
          PROFILE_NAME=$(security cms -D -i "$PROFILE_PATH" | plutil -extract Name raw -)
          echo "PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"
          echo "Using provisioning profile: $PROFILE_NAME"

      - name: Set up App Store Connect API key
        env:
          API_KEY_BASE64: ${{ secrets.APPSTORE_API_PRIVATE_KEY_BASE64 }}
        run: |
          echo -n "$API_KEY_BASE64" | base64 --decode -o "$RUNNER_TEMP/AuthKey.p8"

      - name: Archive (signed release)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          xcodebuild archive \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/iosApp.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=NBTYA5Q847 \
            PRODUCT_BUNDLE_IDENTIFIER=com.ticktrust.siwa \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            INFOPLIST_KEY_ITSAppUsesNonExemptEncryption=NO \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}"

      - name: Export and upload to TestFlight
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>destination</key>
            <string>upload</string>
            <key>teamID</key>
            <string>NBTYA5Q847</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.ticktrust.siwa</key>
              <string>${PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/iosApp.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -authenticationKeyID "${{ secrets.APPSTORE_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APPSTORE_API_ISSUER_ID }}" \
            -authenticationKeyPath "$RUNNER_TEMP/AuthKey.p8"

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true

  # ── Job 6: GitHub Release (tags only) ─────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [ build-android, build-ios ]

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: zeitbank-android-${{ github.sha }}
          path: release-assets/

      - name: Download IPA
        uses: actions/download-artifact@v4
        with:
          name: zeitbank-ios-${{ github.sha }}
          path: release-assets/

      - name: List assets
        run: ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
