name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

env:
  KOTLIN_VERSION: '2.0.21'
  JAVA_VERSION: '17'

jobs:
  # ── Job 1: Static analysis + unit tests ───────────────────────────────────
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run ktlint
        run: ./gradlew ktlintCheck

      - name: Run unit tests with coverage
        run: ./gradlew :shared:koverXmlReport

      - name: Check coverage threshold (70%)
        run: |
          python3 - << 'EOF'
          import xml.etree.ElementTree as ET, sys, os
          path = "shared/build/reports/kover/report.xml"
          if not os.path.exists(path):
              print(f"ERROR: Coverage report not found at {path}")
              sys.exit(1)
          tree = ET.parse(path)
          root = tree.getroot()
          counter = next(
              (c for c in root.findall("counter") if c.get("type") == "LINE"),
              None
          )
          if counter is None:
              print("ERROR: LINE counter not found in coverage report")
              sys.exit(1)
          covered = int(counter.get("covered", 0))
          missed = int(counter.get("missed", 0))
          total = covered + missed
          if total == 0:
              print("ERROR: No lines found in coverage report")
              sys.exit(1)
          pct = covered / total * 100
          print(f"Coverage: {pct:.1f}% ({covered}/{total} lines)")
          if pct < 70:
              print(f"FAIL: {pct:.1f}% is below 70% threshold")
              sys.exit(1)
          print("Coverage threshold passed.")
          EOF

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: shared/build/reports/kover/
          retention-days: 14

  # ── Job 1b: iOS unit tests + logic-layer coverage ─────────────────────────
  ios-test:
    runs-on: macos-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run iOS unit tests with coverage
        run: |
          DEVICE=$(xcrun simctl list devices available -j | python3 -c "import json,sys; d=json.load(sys.stdin); ids=[dev['udid'] for rt,devs in d['devices'].items() if 'iOS' in rt for dev in devs if dev.get('isAvailable') and 'iPhone' in dev['name']]; print(ids[0] if ids else '')")
          echo "Using simulator: $DEVICE"
          xcodebuild test \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -destination "id=$DEVICE" \
            -enableCodeCoverage YES \
            -resultBundlePath build/ios-tests.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Enforce iOS logic-layer coverage (>=70%)
        run: |
          python3 - << 'EOF'
          import json, subprocess, sys
          out = subprocess.check_output(
              ["xcrun", "xccov", "view", "--report", "--json", "build/ios-tests.xcresult"]
          )
          report = json.loads(out)
          # Gate the unit-testable logic files. SwiftUI views and Apple
          # framework code (FamilyControls, networking) are excluded.
          gated = {"Models.swift"}
          covered = total = 0
          rows = []
          for target in report.get("targets", []):
              for f in target.get("files", []):
                  if f["name"] in gated:
                      covered += f["coveredLines"]
                      total += f["executableLines"]
                      rows.append((f["name"], f["coveredLines"], f["executableLines"]))
          if total == 0:
              print("ERROR: no gated files found in coverage report")
              sys.exit(1)
          for name, c, e in rows:
              print(f"{name}: {c}/{e}")
          pct = covered / total * 100
          print(f"iOS logic coverage: {pct:.1f}% ({covered}/{total} lines)")
          if pct < 70:
              print(f"FAIL: {pct:.1f}% is below 70% threshold")
              sys.exit(1)
          print("iOS coverage gate passed.")
          EOF

  # ── Job 2: Integration tests (Android emulator) ───────────────────────────
  integration-test:
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run integration tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          profile: pixel_2
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: ./gradlew :androidApp:connectedDebugAndroidTest

  # ── Job 3: Build Android APK ───────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    needs: [ lint-and-test, integration-test ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          BUILD="${{ github.run_number }}"
          sed -i "s/versionName = \".*\"/versionName = \"${VERSION}\"/" androidApp/build.gradle.kts
          sed -i "s/versionCode = .*/versionCode = ${BUILD}/" androidApp/build.gradle.kts
          echo "Version set to ${VERSION}+${BUILD}"

      - name: Build APK (obfuscated release)
        run: ./gradlew :androidApp:assembleRelease

      - name: Rename APK
        run: |
          VERSION=$(echo "${GITHUB_REF_NAME:-$GITHUB_SHA}" | tr '/' '-')
          # An unsigned, minified release build produces androidApp-release-unsigned.apk
          APK=$(find androidApp/build/outputs/apk/release -name '*.apk' | head -1)
          echo "Found APK: $APK"
          cp "$APK" "androidApp/build/outputs/apk/release/zeitbank-${VERSION}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeitbank-android-${{ github.sha }}
          path: androidApp/build/outputs/apk/release/zeitbank-*.apk
          retention-days: 30

  # ── Job 4: Build iOS IPA ───────────────────────────────────────────────────
  build-ios:
    runs-on: macos-latest
    needs: [ lint-and-test, integration-test ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build shared KMP framework for iOS
        run: ./gradlew :shared:assembleZeitBankSharedReleaseXCFramework

      - name: Archive iOS app (unsigned)
        run: |
          xcodebuild archive \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/ios/iosApp.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Export IPA (no signing)
        run: |
          cat > /tmp/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath build/ios/iosApp.xcarchive \
            -exportPath build/ios/export \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO || true
          # Fallback: package directly from .app in archive
          if [ ! -f "build/ios/export/iosApp.ipa" ]; then
            mkdir -p build/ios/export/Payload
            cp -r build/ios/iosApp.xcarchive/Products/Applications/iosApp.app \
                  build/ios/export/Payload/
            cd build/ios/export
            zip -r iosApp.ipa Payload
            rm -rf Payload
          fi

      - name: Rename IPA
        run: |
          VERSION=$(echo "${GITHUB_REF_NAME:-$GITHUB_SHA}" | tr '/' '-')
          cp build/ios/export/iosApp.ipa build/ios/export/zeitbank-${VERSION}.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeitbank-ios-${{ github.sha }}
          path: build/ios/export/zeitbank-*.ipa
          retention-days: 30

  # ── Job 5: Upload to TestFlight (tags only) ───────────────────────────────
  testflight:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    needs: [ build-ios ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26 (App Store requires the iOS 26 SDK)
        run: |
          XC=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XC" ]; then
            echo "Xcode 26 not found. Installed Xcodes:"; ls -d /Applications/Xcode_*.app
            XC=$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)
          fi
          echo "Selecting $XC"
          sudo xcode-select -s "$XC/Contents/Developer"
          xcodebuild -version

      - name: Set up App Store Connect API key
        env:
          API_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY_BASE64 }}
        run: |
          KEY="$RUNNER_TEMP/AuthKey.p8"
          # Accept either the raw .p8 (PEM) or its base64 encoding
          if printf '%s' "$API_KEY" | grep -q 'BEGIN PRIVATE KEY'; then
            printf '%s\n' "$API_KEY" > "$KEY"
          else
            printf '%s' "$API_KEY" | base64 --decode > "$KEY"
          fi

      - name: Archive (signed release, automatic cloud signing)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          xcodebuild archive \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/iosApp.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyID "${{ secrets.APPSTORE_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APPSTORE_API_ISSUER_ID }}" \
            -authenticationKeyPath "$RUNNER_TEMP/AuthKey.p8" \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=NBTYA5Q847 \
            PRODUCT_BUNDLE_IDENTIFIER=com.ticktrust.siwa \
            INFOPLIST_KEY_ITSAppUsesNonExemptEncryption=NO \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}"

      - name: Export and upload to TestFlight
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>destination</key>
            <string>upload</string>
            <key>teamID</key>
            <string>NBTYA5Q847</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/iosApp.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyID "${{ secrets.APPSTORE_API_KEY_ID }}" \
            -authenticationKeyIssuerID "${{ secrets.APPSTORE_API_ISSUER_ID }}" \
            -authenticationKeyPath "$RUNNER_TEMP/AuthKey.p8"

  # ── Job 6: GitHub Release (tags only) ─────────────────────────────────────
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [ build-android, build-ios ]

    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: zeitbank-android-${{ github.sha }}
          path: release-assets/

      - name: Download IPA
        uses: actions/download-artifact@v4
        with:
          name: zeitbank-ios-${{ github.sha }}
          path: release-assets/

      - name: List assets
        run: ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
